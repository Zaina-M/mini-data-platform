name: CD Deploy
on:
  workflow_dispatch:
  workflow_call:

jobs:
  cd-deploy-test:
    name: CD - Deploy to Test Environment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AIRFLOW_DB_USER: ${{ secrets.AIRFLOW_DB_USER }}
      AIRFLOW_DB_PASSWORD: ${{ secrets.AIRFLOW_DB_PASSWORD }}
      AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
      AIRFLOW_SECRET_KEY: ${{ secrets.AIRFLOW_SECRET_KEY }}
      AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
      AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
      ANALYTICS_DB_USER: ${{ secrets.ANALYTICS_DB_USER }}
      ANALYTICS_DB_NAME: ${{ secrets.ANALYTICS_DB_NAME }}
      ANALYTICS_DB_PASSWORD: ${{ secrets.ANALYTICS_DB_PASSWORD }}
      METABASE_DB_USER: ${{ secrets.METABASE_DB_USER }}
      METABASE_DB_PASSWORD: ${{ secrets.METABASE_DB_PASSWORD }}
      MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
    
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for docker compose
        run: bash scripts/ci/write_compose_env.sh

      - name: Deploy containers to test environment
        run: |
          bash scripts/ci/bootstrap_compose_stack.sh
          echo "All containers deployed"

      - name: Wait for services to be healthy
        run: |
          bash scripts/ci/wait_platform_services.sh
          echo "All services healthy in test environment"

      - name: Install Python clients
        run: pip install minio pandas > /dev/null

      - name: Smoke test – verify data flow
        env:
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          ANALYTICS_DB_USER: ${{ secrets.ANALYTICS_DB_USER }}
          ANALYTICS_DB_NAME: ${{ secrets.ANALYTICS_DB_NAME || 'analytics' }}
          SUCCESS_MESSAGE: "SMOKE TEST PASSED: deployment is functional"
          FAILURE_MESSAGE: "SMOKE TEST FAILED"
        run: |
          cd data-generator
          python generate_sales.py --records 20 --error-rate 0.0 --output smoke_test.csv

          python3 ../scripts/ci/upload_minio_object.py \
            --bucket raw-sales \
            --object-name smoke_test.csv \
            --file-path smoke_test.csv
          cd ..

          bash scripts/ci/trigger_dag.sh sales_data_pipeline
          bash scripts/ci/wait_for_dag.sh sales_data_pipeline 40 10
          bash scripts/ci/check_sales_row_count.sh

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs airflow-db --tail 50

      - name: Deployment summary
        run: |
          echo "============================================="
          echo "   CD DEPLOYMENT COMPLETE"
          echo "============================================="
          echo "  All services deployed and healthy"
          echo "  Smoke test passed – data flows end-to-end"
          echo "============================================="

      - name: Stop test environment
        if: always()
        run: docker compose down -v --remove-orphans

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    steps:
      - name: All tests passed
        run: echo "All tests passed successfully!"
