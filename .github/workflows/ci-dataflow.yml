name: CI - Data Flow (E2E)

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "airflow/**"
      - "data-generator/**"
      - "docker-compose.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "airflow/**"
      - "data-generator/**"

jobs:
  data-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AIRFLOW_DB_USER: ${{ secrets.AIRFLOW_DB_USER }}
      ANALYTICS_DB_USER: ${{ secrets.ANALYTICS_DB_USER }}
      ANALYTICS_DB_NAME: ${{ secrets.ANALYTICS_DB_NAME }}
      METABASE_DB_USER: ${{ secrets.METABASE_DB_USER }}
      MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

 
# ── 1. Write .env — one echo per line, no indentation issues ───────────
      - name: Create .env file for docker compose
        env:
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          AIRFLOW_DB_USER: ${{ secrets.AIRFLOW_DB_USER }}
          AIRFLOW_DB_PASSWORD: ${{ secrets.AIRFLOW_DB_PASSWORD }}
          AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
          AIRFLOW_SECRET_KEY: ${{ secrets.AIRFLOW_SECRET_KEY }}
          AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          ANALYTICS_DB_USER: ${{ secrets.ANALYTICS_DB_USER }}
          ANALYTICS_DB_PASSWORD: ${{ secrets.ANALYTICS_DB_PASSWORD }}
          METABASE_DB_USER: ${{ secrets.METABASE_DB_USER }}
          METABASE_DB_PASSWORD: ${{ secrets.METABASE_DB_PASSWORD }}
        run: bash scripts/ci/write_compose_env.sh

      # ── 2. Build and start ALL platform services ────────────────────────────
      - name: Build and start all services
        run: bash scripts/ci/bootstrap_compose_stack.sh

      # ── 3. Wait for all services to be healthy ──────────────────────────────
      - name: Wait for all services
        run: bash scripts/ci/wait_platform_services.sh

      # ── Set up Python and install dependencies ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r data-generator/requirements.txt

      # ── 4. Verify MinIO buckets ──────────────────────────────────────────────
      - name: Verify MinIO buckets
        env:
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
        run: python3 scripts/ci/verify_minio_buckets.py

      # ── 5. Verify PostgreSQL schema ──────────────────────────────────────────
      - name: Verify PostgreSQL schema
        env:
          ANALYTICS_DB_USER: ${{ secrets.ANALYTICS_DB_USER }}
          ANALYTICS_DB_NAME: ${{ secrets.ANALYTICS_DB_NAME || 'analytics' }}
        run: bash scripts/ci/verify_postgres_schema.sh

      # ── 6. Upload test data to MinIO ─────────────────────────────────────────
      - name: Generate and upload test data to MinIO
        env:
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
        run: bash scripts/ci/generate_and_upload_test_data.sh

      # ── 7. Trigger Airflow DAG ───────────────────────────────────────────────
      - name: Unpause and trigger Airflow DAG
        run: bash scripts/ci/trigger_dag.sh sales_data_pipeline

      # ── 8. Wait for DAG run to complete ─────────────────────────────────────
      - name: Wait for DAG run to complete
        run: bash scripts/ci/wait_for_dag.sh sales_data_pipeline 60 10

      # ── 9. Verify data landed in PostgreSQL ──────────────────────────────────
      - name: Verify data in PostgreSQL
        env:
          ANALYTICS_DB_USER: ${{ secrets.ANALYTICS_DB_USER }}
          ANALYTICS_DB_NAME: ${{ secrets.ANALYTICS_DB_NAME || 'analytics' }}
          SUCCESS_MESSAGE: "STORAGE CHECK PASSED: rows loaded into PostgreSQL"
          FAILURE_MESSAGE: "STORAGE CHECK FAILED: no rows found in sales table"
        run: bash scripts/ci/verify_data_in_postgres.sh

      # ── 10. Verify MinIO archival ─────────────────────────────────────────────
      - name: Verify MinIO archival
        run: python3 scripts/ci/verify_minio_archival.py --object-name test_flow.csv

      # ── 11. Verify Metabase can query the data ───────────────────────────────
      - name: Verify Metabase visualization layer
        env:
          METABASE_DB_PASSWORD: ${{ secrets.METABASE_DB_PASSWORD }}
          ANALYTICS_DB_NAME: ${{ secrets.ANALYTICS_DB_NAME || 'analytics' }}
          ANALYTICS_DB_USER: ${{ secrets.ANALYTICS_DB_USER }}
          ANALYTICS_DB_PASSWORD: ${{ secrets.ANALYTICS_DB_PASSWORD }}
        run: bash scripts/ci/verify_metabase_visualization.sh

      # ── 12. Data flow summary ────────────────────────────────────────────────
      - name: Data flow validation summary
        if: always()
        run: bash scripts/ci/print_dataflow_summary.sh

      # ── 13. Debug logs on failure ────────────────────────────────────────────
      - name: Collect debug logs
        if: failure()
        run: bash scripts/ci/collect_dataflow_debug_logs.sh

      - name: Stop services
        if: always()
        run: docker compose down -v --remove-orphans

     
