name: CI - Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "Dockerfile"
      - "airflow/**"
      - "sql/**"
  pull_request:
    paths:
      - "docker-compose.yml"
      - "Dockerfile"
      - "airflow/**"
      - "sql/**"

jobs:
  infra-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Create .env so docker-compose has all required variables in CI
      - name: Create .env for CI
        run: |
          cat << EOF > .env
          POSTGRES_USER=airflow
          POSTGRES_PASSWORD=airflow
          POSTGRES_DB=airflow
          EOF

      # Docker validation
      - name: Validate docker-compose
        run: docker compose config -q

      - name: Build containers
        run: docker compose build

      # SQL validation
      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint SQL
        run: sqlfluff lint sql/ --dialect postgres

      # Start DB and wait for it to be healthy before DAG validation
      - name: Start airflow-db
        run: |
          docker compose up -d airflow-db
          timeout 60 bash -c \
            'until docker compose exec airflow-db pg_isready -U airflow; do sleep 2; done'

      - name: Debug DB logs (on failure)
        if: failure()
        run: docker compose logs airflow-db

      # DAG validation — run inside Docker, not on the runner
      - name: Validate DAGs
        run: |
          docker compose run --rm airflow-scheduler python -c "
          from airflow.models import DagBag
          dag_bag = DagBag('dags/', include_examples=False)
          assert not dag_bag.import_errors, dag_bag.import_errors
          print('DAGs valid')
          "

      # Security
      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1

      # Always clean up, even if a step fails
      - name: Tear down
        if: always()
        run: docker compose down -v