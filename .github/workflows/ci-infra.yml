name: CI - Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "Dockerfile"
      - "airflow/**"
      - "sql/**"
  pull_request:
    paths:
      - "docker-compose.yml"
      - "Dockerfile"
      - "airflow/**"
      - "sql/**"

jobs:
  infra-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Create .env so docker-compose has all required variables in CI
      - name: Create .env for CI
        run: bash scripts/ci/infra_create_env.sh

      # Docker validation
      - name: Validate docker-compose
        run: bash scripts/ci/infra_validate_compose.sh

      - name: Build containers
        run: bash scripts/ci/infra_build_containers.sh

      # SQL validation
      - name: Install sqlfluff
        run: bash scripts/ci/infra_install_sqlfluff.sh

      - name: Lint SQL
        run: bash scripts/ci/infra_sql_lint.sh

      # Start DB and wait for it to be healthy before DAG validation
      - name: Start airflow-db
        run: bash scripts/ci/infra_start_airflow_db.sh

      - name: Debug DB logs (on failure)
        if: failure()
        run: docker compose logs airflow-db

      # DAG validation — run inside Docker, not on the runner
      - name: Validate DAGs
        run: docker compose run --rm airflow-scheduler python scripts/ci/infra_validate_dags.py

      # Security
      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1

      # Always clean up, even if a step fails
      - name: Tear down
        if: always()
        run: docker compose down -v