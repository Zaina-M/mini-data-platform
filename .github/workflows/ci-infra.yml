name: CI - Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "Dockerfile"
      - "airflow/**"
      - "sql/**"
  pull_request:
    paths:
      - "docker-compose.yml"
      - "Dockerfile"
      - "airflow/**"
      - "sql/**"

jobs:
  infra-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Create .env so docker-compose has all required variables in CI
      - name: Create .env for CI
        env:
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          AIRFLOW_DB_USER: ${{ secrets.AIRFLOW_DB_USER }}
          AIRFLOW_DB_PASSWORD: ${{ secrets.AIRFLOW_DB_PASSWORD }}
          AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
          AIRFLOW_SECRET_KEY: ${{ secrets.AIRFLOW_SECRET_KEY }}
          AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          ANALYTICS_DB_USER: ${{ secrets.ANALYTICS_DB_USER }}
          ANALYTICS_DB_PASSWORD: ${{ secrets.ANALYTICS_DB_PASSWORD }}
          METABASE_DB_USER: ${{ secrets.METABASE_DB_USER }}
          METABASE_DB_PASSWORD: ${{ secrets.METABASE_DB_PASSWORD }}
        run: bash scripts/ci/infra_create_env.sh

      # Docker validation
      - name: Validate docker-compose
        run: bash scripts/ci/infra_validate_compose.sh

      - name: Build containers
        run: bash scripts/ci/infra_build_containers.sh

      # SQL validation
      - name: Install sqlfluff
        run: bash scripts/ci/infra_install_sqlfluff.sh

      - name: Lint SQL
        run: bash scripts/ci/infra_sql_lint.sh

      - name: Prepare Airflow mount dirs
        run: bash scripts/ci/infra_prepare_airflow_dirs.sh

      # Start DB and wait for it to be healthy before DAG validation
      - name: Start airflow-db
        run: bash scripts/ci/infra_start_airflow_db.sh

      - name: Debug DB logs (on failure)
        if: failure()
        run: docker compose logs airflow-db

      # DAG validation — run inside Docker, not on the runner
      - name: Validate DAGs
        run: docker compose run --rm -v "$PWD/scripts/ci:/opt/airflow/scripts/ci" airflow-scheduler python /opt/airflow/scripts/ci/infra_validate_dags.py

      # Security
      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1

      # Always clean up, even if a step fails
      - name: Tear down
        if: always()
        run: docker compose down -v