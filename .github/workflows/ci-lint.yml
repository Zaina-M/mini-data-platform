name: CI - Lint

on:
  push:
    branches: [main]
    paths:
      - "airflow/dags/**"
      - "data-generator/**"
      - "tests/**"
  pull_request:
    paths:
      - "airflow/dags/**"
      - "data-generator/**"
      - "tests/**"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install tools
        run: bash scripts/ci/install_lint_tools.sh

      - name: Run lint suite
        run: bash scripts/ci/run_lint_suite.sh