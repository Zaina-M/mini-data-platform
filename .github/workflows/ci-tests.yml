name: CI - Tests

on:
  push:
    branches: [main]
    paths:
      - "tests/**"
      - "airflow/**"
      - "data-generator/**"
  pull_request:
    paths:
      - "tests/**"
      - "airflow/**"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pandas pandera numpy minio psycopg2-binary

      - name: Run all tests
        run: |
          pytest tests/ -v --tb=short --cov=airflow/dags --cov-report=term-missing