name: CI - Tests

on:
  push:
    branches: [main]
    paths:
      - "tests/**"
      - "airflow/**"
      - "data-generator/**"
  pull_request:
    paths:
      - "tests/**"
      - "airflow/**"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: bash scripts/ci/install_test_dependencies.sh

      - name: Run all tests
        run: bash scripts/ci/run_pytest_suite.sh