name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install flake8 black isort mypy

      - name: Run flake8
        run: |
          flake8 airflow/dags/ data-generator/ tests/ \
            --max-line-length=100 \
            --ignore=E501,W503,E402

      - name: Check formatting with black
        run: |
          black --check --diff airflow/dags/ data-generator/ tests/

      - name: Check import sorting
        run: |
          isort --check-only --diff airflow/dags/ data-generator/ tests/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov pytest-xdist
          pip install pandas pandera minio psycopg2-binary numpy

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=airflow/dags \
            --cov-report=xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  test-schemas:
    name: Test Pandera Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pandas pandera

      - name: Run schema tests
        run: |
          pytest tests/test_schemas.py tests/test_validators.py -v --tb=short

  test-transformers:
    name: Test Transformers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pandas pandera numpy

      - name: Run transformer tests
        run: |
          pytest tests/test_data_cleaner.py tests/test_data_enricher.py -v --tb=short

  test-services:
    name: Test Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pandas minio psycopg2-binary pandera

      - name: Run service tests
        run: |
          pytest tests/test_minio_service.py tests/test_postgres_service.py -v --tb=short

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-schemas, test-transformers]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pandas pandera minio psycopg2-binary numpy

      - name: Run integration tests
        run: |
          pytest tests/test_integration.py -v --tb=short

  validate-dags:
    name: Validate Airflow DAGs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install apache-airflow==2.8.1 pandas minio psycopg2-binary pandera

      - name: Validate DAG syntax
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/airflow
          MINIO_ENDPOINT: minio:9000
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test
          MINIO_SECURE: 'false'
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        run: |
          python -c "
          import sys
          from airflow.models import DagBag

          dag_bag = DagBag('airflow/dags/', include_examples=False)
          
          if dag_bag.import_errors:
              print('DAG Import Errors:')
              for dag_id, error in dag_bag.import_errors.items():
                  print(f'  {dag_id}: {error}')
              sys.exit(1)
          
          print(f'Successfully validated {len(dag_bag.dags)} DAG(s):')
          for dag_id in dag_bag.dags:
              print(f'  - {dag_id}')
          "

  validate-sql:
    name: Validate SQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint SQL files
        run: |
          sqlfluff lint sql/ --dialect postgres || true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    env:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ENDPOINT: minio:9000
      AIRFLOW_DB_USER: airflow
      AIRFLOW_DB_PASSWORD: airflow
      AIRFLOW_DB_NAME: airflow
      AIRFLOW_FERNET_KEY: '81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs='
      AIRFLOW_SECRET_KEY: 'a]xM8F-Z2e9HP!qN'
      AIRFLOW_ADMIN_USER: admin
      AIRFLOW_ADMIN_PASSWORD: admin
      ANALYTICS_DB_HOST: analytics-db
      ANALYTICS_DB_PORT: '5432'
      ANALYTICS_DB_NAME: analytics
      ANALYTICS_DB_USER: analytics
      ANALYTICS_DB_PASSWORD: analytics
      METABASE_DB_USER: metabase
      METABASE_DB_PASSWORD: metabase
      METABASE_DB_NAME: metabase
      METABASE_DB_HOST: metabase-db
      METABASE_DB_PORT: '5432'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: |
          docker compose config -q
          echo "docker-compose.yml is valid"

      - name: Build containers
        run: |
          docker compose build --no-cache
          echo "All containers built successfully"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy filesystem scan
        run: |
          trivy fs --severity CRITICAL,HIGH --exit-code 0 .

  data-flow-validation:
    name: Data Flow Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [docker-build, unit-tests]
    env:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ENDPOINT: minio:9000
      AIRFLOW_DB_USER: airflow
      AIRFLOW_DB_PASSWORD: airflow
      AIRFLOW_DB_NAME: airflow
      AIRFLOW_FERNET_KEY: '81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs='
      AIRFLOW_SECRET_KEY: 'a]xM8F-Z2e9HP!qN'
      AIRFLOW_ADMIN_USER: admin
      AIRFLOW_ADMIN_PASSWORD: admin
      ANALYTICS_DB_HOST: analytics-db
      ANALYTICS_DB_PORT: '5432'
      ANALYTICS_DB_NAME: analytics
      ANALYTICS_DB_USER: analytics
      ANALYTICS_DB_PASSWORD: analytics
      METABASE_DB_USER: metabase
      METABASE_DB_PASSWORD: metabase
      METABASE_DB_NAME: metabase
      METABASE_DB_HOST: metabase-db
      METABASE_DB_PORT: '5432'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python clients
        run: pip install minio pandas > /dev/null

      # ── 1. Build and start ALL platform services ────────────────
      - name: Build and start all services
        run: |
          docker compose up -d --build
          echo "Services starting..."

      # ── 2. Wait for all services to be healthy ──────────────────
      - name: Wait for all services
        run: |
          wait_for() {
            local name="$1" cmd="$2" max="$3"
            for i in $(seq 1 "$max"); do
              if eval "$cmd" > /dev/null 2>&1; then
                echo "  ✓ $name is healthy"
                return 0
              fi
              sleep 5
            done
            echo "  ✗ $name FAILED after $max attempts"
            return 1
          }

          echo "Waiting for infrastructure..."
          wait_for "MinIO"        "curl -sf http://localhost:9000/minio/health/live" 36
          wait_for "Airflow DB"   "docker exec airflow-db pg_isready -U ${{ env.AIRFLOW_DB_USER }}" 36
          wait_for "Analytics DB" "docker exec analytics-db pg_isready -U ${{ env.ANALYTICS_DB_USER }}" 36

          echo "Waiting for airflow-init to complete..."
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Status}}' airflow-init 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "exited" ]; then
              EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' airflow-init)
              if [ "$EXIT_CODE" = "0" ]; then
                echo "  ✓ airflow-init completed successfully"
                break
              else
                echo "  ✗ airflow-init exited with code $EXIT_CODE"
                docker logs airflow-init --tail 30
                exit 1
              fi
            fi
            echo "  airflow-init: $STATUS (attempt $i/60)"
            sleep 5
          done

          echo "Waiting for application services..."

          # Wait for scheduler container to be running first
          echo "  Waiting for scheduler container..."
          for i in $(seq 1 30); do
            SCHED_STATUS=$(docker inspect --format='{{.State.Status}}' airflow-scheduler 2>/dev/null || echo "not-found")
            if [ "$SCHED_STATUS" = "running" ]; then
              echo "  ✓ Scheduler container is running"
              break
            fi
            echo "    scheduler status: $SCHED_STATUS (attempt $i/30)"
            sleep 5
          done

          # Check scheduler container is still running (not crashed)
          FINAL_STATUS=$(docker inspect --format='{{.State.Status}}' airflow-scheduler 2>/dev/null || echo "unknown")
          if [ "$FINAL_STATUS" != "running" ]; then
            echo "  ✗ Scheduler container not running (status: $FINAL_STATUS)"
            docker logs airflow-scheduler --tail 50
            exit 1
          fi

          # Wait for airflow CLI to be responsive (check db connection)
          echo "  Waiting for Airflow CLI..."
          for i in $(seq 1 60); do
            if docker exec airflow-scheduler airflow db check > /dev/null 2>&1; then
              echo "  ✓ Airflow database connection OK (attempt $i)"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "  ✗ Airflow database check failed after 60 attempts"
              echo "--- Container Status ---"
              docker compose ps
              echo "--- Scheduler Logs ---"
              docker logs airflow-scheduler --tail 100
              echo "--- DB Check Output ---"
              docker exec airflow-scheduler airflow db check 2>&1 || true
              exit 1
            fi
            echo "    db check attempt $i/60..."
            sleep 5
          done

          # Now verify DAGs can be listed
          echo "  Checking DAG parsing..."
          if ! docker exec airflow-scheduler airflow dags list 2>&1; then
            echo "  ✗ DAG listing failed"
            docker exec airflow-scheduler airflow dags list-import-errors 2>&1 || true
            exit 1
          fi
          echo "  ✓ Airflow Scheduler is healthy"

          wait_for "Metabase" "curl -sf http://localhost:3000/api/health" 60

          echo "All services healthy"
          docker compose ps

      # ── 6. Verify MinIO buckets were created ───────────────────
      - name: Verify MinIO buckets
        run: |
          python3 -c "
          from minio import Minio
          client = Minio('localhost:9000', 'minioadmin', 'minioadmin', secure=False)
          buckets = [b.name for b in client.list_buckets()]
          print(f'Buckets found: {buckets}')
          for name in ['raw-sales', 'processed', 'archive']:
              assert name in buckets, f'Bucket {name} missing!'
          print('All required buckets exist')
          "

      # ── 7. Verify PostgreSQL schema ────────────────────────────
      - name: Verify PostgreSQL schema
        run: |
          docker exec analytics-db psql -U ${{ env.ANALYTICS_DB_USER }} -d ${{ env.ANALYTICS_DB_NAME }} -c "
            SELECT table_name FROM information_schema.tables
            WHERE table_schema = 'public' AND table_type = 'BASE TABLE';
          "
          docker exec analytics-db psql -U ${{ env.ANALYTICS_DB_USER }} -d ${{ env.ANALYTICS_DB_NAME }} -c "
            SELECT table_name FROM information_schema.views
            WHERE table_schema = 'public';
          "

      # ── 8. Upload test data to MinIO (Ingestion) ───────────────
      - name: Generate and upload test data to MinIO
        run: |
          cd data-generator
          python generate_sales.py --records 50 --error-rate 0.05 --output test_flow.csv
          python3 -c "
          from minio import Minio
          client = Minio('localhost:9000', 'minioadmin', 'minioadmin', secure=False)
          client.fput_object('raw-sales', 'test_flow.csv', 'test_flow.csv')
          objects = [o.object_name for o in client.list_objects('raw-sales')]
          print(f'Files in raw-sales after upload: {objects}')
          assert 'test_flow.csv' in objects, 'Upload verification failed!'
          print('INGESTION CHECK PASSED: test data uploaded to MinIO')
          "

      # ── 9. Trigger Airflow DAG via CLI (Processing) ─────────────
      - name: Unpause and trigger Airflow DAG
        run: |
          # Unpause the DAG via CLI on the scheduler container
          docker exec airflow-scheduler airflow dags unpause sales_data_pipeline
          echo "DAG unpaused"

          # Trigger the DAG via CLI
          docker exec airflow-scheduler airflow dags trigger sales_data_pipeline
          echo "DAG triggered"

      # ── 10. Wait for DAG run to complete ────────────────────────
      - name: Wait for DAG run to complete
        run: |
          echo "Polling DAG run status via CLI..."
          for i in $(seq 1 60); do
            STATE=$(docker exec airflow-scheduler airflow dags list-runs -d sales_data_pipeline -o plain --no-backfill 2>/dev/null | head -5 | grep -oE '(success|failed|running|queued)' | head -1 || echo "unknown")
            echo "  attempt $i/60 – state: $STATE"

            if [ "$STATE" = "success" ]; then
              echo "PROCESSING CHECK PASSED: DAG completed successfully"
              exit 0
            elif [ "$STATE" = "failed" ]; then
              echo "DAG run failed! Dumping scheduler logs..."
              docker compose logs airflow-scheduler --tail 80
              exit 1
            fi
            sleep 10
          done
          echo "DAG run timed out"
          docker compose logs airflow-scheduler --tail 80
          exit 1

      # ── 11. Verify data landed in PostgreSQL (Storage) ──────────
      - name: Verify data in PostgreSQL
        run: |
          echo "Checking sales table for loaded data..."
          ROW_COUNT=$(docker exec analytics-db psql -U ${{ env.ANALYTICS_DB_USER }} -d ${{ env.ANALYTICS_DB_NAME }} -t -c "SELECT COUNT(*) FROM sales;")
          ROW_COUNT=$(echo "$ROW_COUNT" | xargs)
          echo "Rows in sales table: $ROW_COUNT"

          if [ "$ROW_COUNT" -gt 0 ]; then
            echo "STORAGE CHECK PASSED: $ROW_COUNT rows loaded into PostgreSQL"
          else
            echo "STORAGE CHECK FAILED: no rows found in sales table"
            exit 1
          fi

          echo ""
          echo "=== Sample data ==="
          docker exec analytics-db psql -U ${{ env.ANALYTICS_DB_USER }} -d ${{ env.ANALYTICS_DB_NAME }} -c \
            "SELECT order_id, product_name, quantity, unit_price, total_amount, country FROM sales LIMIT 5;"

          echo ""
          echo "=== Daily sales summary view ==="
          docker exec analytics-db psql -U ${{ env.ANALYTICS_DB_USER }} -d ${{ env.ANALYTICS_DB_NAME }} -c \
            "SELECT * FROM daily_sales_summary LIMIT 5;"

          echo ""
          echo "=== Product performance view ==="
          docker exec analytics-db psql -U ${{ env.ANALYTICS_DB_USER }} -d ${{ env.ANALYTICS_DB_NAME }} -c \
            "SELECT * FROM product_performance LIMIT 5;"

          echo ""
          echo "=== Country analysis view ==="
          docker exec analytics-db psql -U ${{ env.ANALYTICS_DB_USER }} -d ${{ env.ANALYTICS_DB_NAME }} -c \
            "SELECT * FROM country_analysis LIMIT 5;"

      # ── 12. Verify file archived in MinIO ───────────────────────
      - name: Verify MinIO archival
        run: |
          python3 -c "
          from minio import Minio
          client = Minio('localhost:9000', 'minioadmin', 'minioadmin', secure=False)

          raw_files = [o.object_name for o in client.list_objects('raw-sales')]
          archive_files = [o.object_name for o in client.list_objects('archive', recursive=True)]

          print(f'Files remaining in raw-sales: {raw_files}')
          print(f'Files in archive: {archive_files}')

          if 'test_flow.csv' not in raw_files and len(archive_files) > 0:
              print('ARCHIVE CHECK PASSED: file moved from raw-sales to archive')
          elif 'test_flow.csv' in raw_files:
              print('WARNING: file still in raw-sales (may not have been archived yet)')
          else:
              print('Archive check inconclusive')
          "

      # ── 13. Verify Metabase can query the data (Visualization) ─
      - name: Verify Metabase visualization layer
        run: |
          # Set up Metabase and get a session token
          echo "Setting up Metabase admin account..."
          # Check if setup is needed
          SETUP_TOKEN=$(curl -sf http://localhost:3000/api/session/properties | python3 -c "
          import sys, json
          props = json.load(sys.stdin)
          token = props.get('setup-token', '')
          print(token)
          " 2>/dev/null || true)

          if [ -n "$SETUP_TOKEN" ] && [ "$SETUP_TOKEN" != "None" ]; then
            echo "Running first-time Metabase setup..."
            curl -sf -X POST http://localhost:3000/api/setup \
              -H "Content-Type: application/json" \
              -d "{
                \"token\": \"$SETUP_TOKEN\",
                \"user\": {
                  \"first_name\": \"CI\",
                  \"last_name\": \"Test\",
                  \"email\": \"ci@test.com\",
                  \"password\": \"CITest123!\"
                },
                \"database\": {
                  \"engine\": \"postgres\",
                  \"name\": \"Analytics\",
                  \"details\": {
                    \"host\": \"analytics-db\",
                    \"port\": 5432,
                    \"dbname\": \"${{ env.ANALYTICS_DB_NAME }}\",
                    \"user\": \"${{ env.ANALYTICS_DB_USER }}\",
                    \"password\": \"${{ env.ANALYTICS_DB_PASSWORD }}\"
                  }
                },
                \"prefs\": {
                  \"site_name\": \"CI Test\",
                  \"allow_tracking\": false
                }
              }" > /dev/null
            echo "Metabase setup complete"
          else
            echo "Metabase already set up"
          fi

          # Get session token
          echo "Authenticating with Metabase..."
          SESSION_TOKEN=$(curl -sf -X POST http://localhost:3000/api/session \
            -H "Content-Type: application/json" \
            -d '{"username": "ci@test.com", "password": "CITest123!"}' | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Session token acquired"

          # Wait for Metabase to sync the database schema
          echo "Waiting for Metabase to sync database..."
          sleep 30

          # Run a native query through Metabase to verify end-to-end
          echo "Running query through Metabase API..."
          QUERY_RESULT=$(curl -sf -X POST http://localhost:3000/api/dataset \
            -H "Content-Type: application/json" \
            -H "X-Metabase-Session: $SESSION_TOKEN" \
            -d '{
              "database": 1,
              "type": "native",
              "native": {
                "query": "SELECT COUNT(*) as total_rows, SUM(total_amount) as total_revenue, COUNT(DISTINCT country) as countries FROM sales"
              }
            }')

          # Parse and verify results
          python3 -c "
          import json, sys
          result = json.loads('''$QUERY_RESULT''')

          if 'error' in result:
              print(f'Metabase query error: {result[\"error\"]}')
              sys.exit(1)

          rows = result.get('data', {}).get('rows', [])
          if not rows:
              print('VISUALIZATION CHECK FAILED: no data returned from Metabase')
              sys.exit(1)

          total_rows, total_revenue, countries = rows[0]
          print(f'Metabase query results:')
          print(f'  Total rows:    {total_rows}')
          print(f'  Total revenue: {total_revenue}')
          print(f'  Countries:     {countries}')

          if int(total_rows) > 0:
              print('VISUALIZATION CHECK PASSED: Metabase can query sales data from PostgreSQL')
          else:
              print('VISUALIZATION CHECK FAILED: Metabase returned 0 rows')
              sys.exit(1)
          "

      # ── 14. Print full data flow summary ────────────────────────
      - name: Data flow validation summary
        if: always()
        run: |
          echo "============================================="
          echo "   DATA FLOW VALIDATION SUMMARY"
          echo "============================================="
          echo ""
          echo "  MinIO (Ingestion)    → CSV uploaded to raw-sales bucket"
          echo "  Airflow (Processing) → DAG triggered and completed"
          echo "  PostgreSQL (Storage) → Data loaded into sales table"
          echo "  Metabase (Visualize) → Queried sales data successfully"
          echo ""
          echo "  Full pipeline: MinIO → Airflow → PostgreSQL → Metabase"
          echo "============================================="

      # ── 15. Collect debug logs on failure ───────────────────────
      - name: Collect debug logs
        if: failure()
        run: |
          echo "=== Docker container status ==="
          docker compose ps -a
          echo ""
          echo "=== Airflow scheduler logs ==="
          docker compose logs airflow-scheduler --tail 100
          echo ""
          echo "=== Airflow webserver logs ==="
          docker compose logs airflow-webserver --tail 50
          echo ""
          echo "=== Metabase logs ==="
          docker compose logs metabase --tail 50
          echo ""
          echo "=== Analytics DB logs ==="
          docker compose logs analytics-db --tail 30

      - name: Stop services
        if: always()
        run: |
          docker compose down -v

  cd-deploy-test:
    name: CD - Deploy to Test Environment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, unit-tests, validate-dags, docker-build, data-flow-validation]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ENDPOINT: minio:9000
      AIRFLOW_DB_USER: airflow
      AIRFLOW_DB_PASSWORD: airflow
      AIRFLOW_DB_NAME: airflow
      AIRFLOW_FERNET_KEY: '81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs='
      AIRFLOW_SECRET_KEY: 'a]xM8F-Z2e9HP!qN'
      AIRFLOW_ADMIN_USER: admin
      AIRFLOW_ADMIN_PASSWORD: admin
      ANALYTICS_DB_HOST: analytics-db
      ANALYTICS_DB_PORT: '5432'
      ANALYTICS_DB_NAME: analytics
      ANALYTICS_DB_USER: analytics
      ANALYTICS_DB_PASSWORD: analytics
      METABASE_DB_USER: metabase
      METABASE_DB_PASSWORD: metabase
      METABASE_DB_NAME: metabase
      METABASE_DB_HOST: metabase-db
      METABASE_DB_PORT: '5432'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy containers to test environment
        run: |
          echo "Deploying to test environment..."
          docker compose up -d --build
          echo "All containers deployed"

      - name: Wait for services to be healthy
        run: |
          wait_for() {
            local name="$1" cmd="$2" max="$3"
            for i in $(seq 1 "$max"); do
              if eval "$cmd" > /dev/null 2>&1; then
                echo "  ✓ $name: healthy"
                return 0
              fi
              sleep 5
            done
            echo "  ✗ $name: FAILED" && return 1
          }

          echo "Running health checks..."
          wait_for "MinIO" "curl -sf http://localhost:9000/minio/health/live" 36
          wait_for "PostgreSQL" "docker exec analytics-db pg_isready -U ${{ env.ANALYTICS_DB_USER }}" 36

          echo "Waiting for airflow-init..."
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Status}}' airflow-init 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "exited" ]; then break; fi
            sleep 5
          done

          wait_for "Airflow Scheduler" "docker exec airflow-scheduler airflow dags list" 60
          wait_for "Metabase" "curl -sf http://localhost:3000/api/health" 60
          echo "All services healthy in test environment"

      - name: Install Python clients
        run: pip install minio pandas > /dev/null

      - name: Smoke test – verify data flow
        run: |
          # Generate and upload a small test file
          cd data-generator
          python generate_sales.py --records 20 --error-rate 0.0 --output smoke_test.csv

          python3 -c "
          from minio import Minio
          client = Minio('localhost:9000', 'minioadmin', 'minioadmin', secure=False)
          client.fput_object('raw-sales', 'smoke_test.csv', 'smoke_test.csv')
          print('Smoke test data uploaded')
          "
          cd ..

          # Trigger pipeline via CLI
          docker exec airflow-scheduler airflow dags unpause sales_data_pipeline
          docker exec airflow-scheduler airflow dags trigger sales_data_pipeline
          echo "Smoke test DAG triggered"

          # Poll for completion via CLI
          for i in $(seq 1 40); do
            STATE=$(docker exec airflow-scheduler airflow dags list-runs -d sales_data_pipeline -o plain --no-backfill 2>/dev/null | head -5 | grep -oE '(success|failed|running|queued)' | head -1 || echo "unknown")
            if [ "$STATE" = "success" ]; then
              echo "Smoke test DAG completed successfully"
              break
            elif [ "$STATE" = "failed" ]; then
              echo "Smoke test DAG failed" && exit 1
            fi
            sleep 10
          done

          # Verify data in DB
          ROW_COUNT=$(docker exec analytics-db psql -U ${{ env.ANALYTICS_DB_USER }} -d ${{ env.ANALYTICS_DB_NAME }} -t -c "SELECT COUNT(*) FROM sales;" | xargs)
          echo "Rows in sales table: $ROW_COUNT"
          if [ "$ROW_COUNT" -gt 0 ]; then
            echo "SMOKE TEST PASSED: deployment is functional"
          else
            echo "SMOKE TEST FAILED" && exit 1
          fi

      - name: Deployment summary
        run: |
          echo "============================================="
          echo "   CD DEPLOYMENT COMPLETE"
          echo "============================================="
          echo "  All services deployed and healthy"
          echo "  Smoke test passed – data flows end-to-end"
          echo "============================================="

      - name: Stop test environment
        if: always()
        run: |
          docker compose down -v

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, test-schemas, test-transformers, test-services, test-integration, validate-dags, docker-build, data-flow-validation]
    steps:
      - name: All tests passed
        run: |
          echo "All tests passed successfully!"
          echo "Ready for deployment"
